# ODS-OS Operating System
# Build configuration for mmdebstrap

name: ods-os

mmdebstrap:
  # Ubuntu 26.04 LTS (Resolute Raccoon) - Kernel 7.0
  suite: resolute
  variant: minbase
  target: ods-rootfs

  architectures:
    - amd64

  components:
    - main
    - universe
    - multiverse
    - restricted

  # ------------------------------------------------------------------
  # Package List
  # ------------------------------------------------------------------
  include:
    # --- Boot & Kernel ---
    - casper
    - grub-efi-amd64-bin
    - grub-efi-amd64-signed
    - grub-pc-bin
    - linux-image-generic
    - live-boot
    - live-boot-initramfs-tools
    - shim-signed

    # --- GNOME Desktop (Wayland & Mutter) ---
    - blueman
    - gdm3
    - gnome-control-center
    - gnome-core
    - gnome-session
    - gnome-shell
    - gnome-software
    - gnome-software-plugin-snap
    - gnome-terminal
    - mutter
    - nautilus
    - network-manager-gnome
    - wayland-protocols
    - xwayland

    # --- System Base & Package Management ---
    - apt
    - console-setup
    - dbus-x11
    - fuse3
    - gvfs-backends
    - keyboard-configuration
    - locales
    - pkexec
    - polkitd
    - software-properties-common
    - sudo
    - tzdata
    - ubuntu-keyring
    - xserver-xorg-core
    - xserver-xorg-video-qxl

    # --- Development & Programming Languages ---
    - build-essential
    - curl
    - git
    - lua5.4
    - net-tools
    - python3
    - python3-pip
    - valac
    - wget

    # --- Installer & Out-of-Box Experience (OOBE) ---
    - ubiquity
    - ubiquity-frontend-gtk
    - ubiquity-slideshow-ubuntu

  # ------------------------------------------------------------------
  # Customization Hooks
  # ------------------------------------------------------------------
  customize-hooks:
    # Hostname
    - 'echo ods-os > $1/etc/hostname'

    # Remove root password for live session
    - 'chroot $1 passwd -d root || true'

    # Systemd targets and services
    - 'chroot $1 systemctl set-default graphical.target'
    - 'chroot $1 systemctl enable gdm3'
    - 'chroot $1 systemctl enable NetworkManager'

    # Locale generation
    - 'echo "en_US.UTF-8 UTF-8" > $1/etc/locale.gen'
    - 'chroot $1 locale-gen'
    - 'echo "LANG=en_US.UTF-8" > $1/etc/default/locale'

    # Set default timezone to UTC
    - 'ln -sf /usr/share/zoneinfo/UTC $1/etc/localtime'

    # Fix machine-id for live ISO (prevents network/dbus conflicts)
    - 'rm -f $1/etc/machine-id $1/var/lib/dbus/machine-id'
    - 'ln -s /etc/machine-id $1/var/lib/dbus/machine-id'
    - 'touch $1/etc/casper.conf'

    # Prepare OOBE flag
    - 'mkdir -p $1/etc/skel'
    - 'touch $1/var/lib/oobe-user-created'
    - 'echo "ODS-OS 26.04 LTS - GNOME/X11 Edition" > $1/etc/issue'

    # Disable Wayland in GDM (fix for QEMU and virtual machines)
    - 'mkdir -p $1/etc/gdm3'
    - 'printf "[daemon]\nWaylandEnable=false\n" > $1/etc/gdm3/custom.conf'

    # Mask annoying services in live environment (clean boot)
    - 'chroot $1 systemctl mask speech-dispatcher.service || true'
    - 'chroot $1 systemctl mask ubiquity.service || true'
    - 'chroot $1 systemctl mask apt-daily.service || true'
    - 'chroot $1 systemctl mask apt-daily-upgrade.service || true'

    # Cleanup to reduce ISO size
    - 'chroot $1 apt-get clean'
    - 'rm -rf $1/var/lib/apt/lists/*'
